<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscaminas — Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --card: #161628;
      --border: #2a2a4a;
      --accent: #00e5ff;
      --accent2: #ff4081;
      --text: #e0e0f0;
      --muted: #7070a0;
      --danger: #ff5252;
    }

    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
      box-shadow: 0 0 60px rgba(0,229,255,0.08), 0 0 0 1px var(--border);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .icon { font-size: 56px; margin-bottom: 16px; }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,229,255,0.5);
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.15);
    }

    .error-msg {
      background: rgba(255,82,82,0.1);
      border: 1px solid var(--danger);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 12px;
      text-align: left;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      background: var(--accent);
      color: #000;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0,229,255,0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(0,229,255,0.45);
    }
    .btn:active { transform: translateY(0); }

    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
    }

    .ranking-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 12px;
      color: var(--accent2);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .ranking-link:hover { opacity: 0.7; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">💣</div>
  <h1>BUSCA<br>MINAS</h1>
  <p class="subtitle">Ingresa tu nombre para comenzar</p>

  <form method="POST" action="/">
    <label for="nombre">Tu nombre</label>
    <input type="text" id="nombre" name="nombre"
           placeholder="Ej: Alejandro"
           maxlength="50"
           value="{{ request.form.get('nombre', '') }}"
           autofocus>
    {% if error %}
      <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}
    <button type="submit" class="btn">▶ JUGAR</button>
  </form>

  <p class="hint">Descubre todas las celdas sin explotar una mina.</p>
  <a href="/ranking" class="ranking-link">🏆 Ver ranking</a>
</div>
</body>
</html>
